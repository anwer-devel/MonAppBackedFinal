spring:

  datasource:
    url: jdbc:postgresql://postgres:5432/app_db
    username: postgres
    password: postgres_password_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000
      statement-cache-size: 30
      prepared-statement-cache-size: 30
      prepared-statement-cache-sql-limit: 2048

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Auto-detect PostgreSQL dialect
        format_sql: false
        jdbc:
          batch_size: 25
          fetch_size: 50
        statement_cache_size: 30
    show-sql: false

  redis:
    host: redis
    port: 6379
    password: null
    timeout: 60000ms
    lettuce:
      pool:
        max-active: 25
        max-idle: 10
        min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: WARN
    com.app: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: ${JWT_SECRET:production-secret-key-minimum-256-bits-required}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  upload:
    path: /app/uploads



spring:
  application:
    name: monolith-app
  profiles:
    active: dev


  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Hibernate auto-detects PostgreSQL dialect - no need to specify
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        # Performance optimization: use prepared statement caching
        statement_cache_size: 25
        fetch_style: select
    open-in-view: false
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true
      leak-detection-threshold: 30000

  cache:
    type: redis
    redis:
      time-to-live: 600000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    show-common-extensions: true
    urls-primary-name: Monolith App API
  use-fqn: true
  cache:
    disabled: true


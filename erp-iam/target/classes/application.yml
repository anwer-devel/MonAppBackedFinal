server:
  port: 8080

spring:
  application:
    name: erp-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/erp_platform
    username: ${DB_USER:erp_user}
    password: ${DB_PASS:erp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:aVeryLongSecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong2024Platform}
  access-expiry-seconds: 900
  refresh-expiry-seconds: 604800

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.erp.platform: DEBUG
    org.springframework.security: DEBUG
